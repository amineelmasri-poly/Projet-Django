<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="static/tasks/style.css">
    <title>Edit Task</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand"> Task Manager</span>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'task_list' %}">All Tasks</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'task_add' %}">Add Task</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'logout' %}">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-8">
                <h1 class="mb-4"> Edit Task: {{ task.title }}</h1>

                <div class="card">
                    <div class="card-body">
                        <form method="post" enctype="multipart/form-data" novalidate>
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label">Title</label>
                                <input type="text" name="title" class="form-control" value="{{ task.title }}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Description</label>
                                <textarea name="description" class="form-control" rows="4">{{ task.description }}</textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Category</label>
                                <select name="category" class="form-select" required>
                                    {% for category in categories %}<option value="{{ category.id }}" {% if category.id == task.category.id %}selected{% endif %}>{{ category.name }}</option>{% endfor %}
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Due Date</label>
                                <input type="datetime-local" name="due_date" class="form-control" value="{{ task.due_date|date:'Y-m-dTH:i' }}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Image</label>
                                {% if task.image %}
                                <div class="mb-2">
                                    <img src="{{ task.image.url }}" alt="{{ task.title }}" class="img-thumbnail" style="max-width: 200px;">
                                </div>
                                {% endif %}
                                <input type="file" name="image" class="form-control" accept="image/*">
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" name="completed" class="form-check-input" id="completed" {% if task.completed %}checked{% endif %}>
                                <label class="form-check-label" for="completed">Mark as completed</label>
                            </div>
                            <button type="submit" class="btn btn-primary">Update</button>
                            <a href="{% url 'task_list' %}" class="btn btn-secondary">Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
