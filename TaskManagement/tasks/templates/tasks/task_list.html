<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="static/tasks/style.css">
    <title>Task List</title>
</head>
<body>
    <nav>
        <a href="{% url 'task_list' %}">All Tasks</a>
        |
        <a href="{% url 'task_add' %}">Add Task</a>
    </nav>
    <hr>

    <h1>Task List</h1>

    {% if tasks %}
    <div class="task-grid">
        {% for task in tasks %}
        <div class="task-card">
            <h2>{{ task.title }}</h2>
            <p><strong>Category:</strong> {{ task.category.name }}</p>
            <p><strong>Due date:</strong> {{ task.due_date }}</p>
            <p><strong>Completed:</strong> {{ task.completed }}</p>
            <div class="task-actions">
                <a href="{% url 'task_edit' task.pk %}">Edit</a>
                <a href="{% url 'task_delete' task.pk %}">Delete</a>
            </div>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <p>No tasks yet. Click "Add Task" to create your first one.</p>
    {% endif %}
</body>
</html>
